name: Canary – Build, Push & Deploy Canary Release

on:
  push:
    tags:
      - 'v*-canary*'

env:
  BACKEND_IMAGE: iqbalmorshed/quickhire-backend
  FRONTEND_IMAGE: iqbalmorshed/quickhire-frontend

jobs:
  # ── 1. Build test ──
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & build backend
        working-directory: quick-hire
        run: npm ci && npm run build

      - name: Install & build frontend
        working-directory: quick-hire-app
        run: npm ci && NEXT_PUBLIC_API_URL=https://api.example.com/api npm run build

  # ── 2. Build and push canary Docker images ──
  docker:
    name: Docker Build & Push (Canary)
    runs-on: ubuntu-latest
    needs: build-test
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend (canary)
        uses: docker/build-push-action@v6
        with:
          context: ./quick-hire
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend (canary)
        uses: docker/build-push-action@v6
        with:
          context: ./quick-hire-app
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:2021/api' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Update canary K8s manifests with the new version tag ──
  update-canary-manifests:
    name: Update Canary Manifests
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tags in canary manifests
        env:
          VERSION: ${{ needs.docker.outputs.version }}
        run: |
          sed -i "s|image: ${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.BACKEND_IMAGE }}:${VERSION}|" k8s/canary/backend-canary.yaml
          sed -i "s|image: ${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.FRONTEND_IMAGE }}:${VERSION}|" k8s/canary/frontend-canary.yaml

      - name: Commit canary manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/canary/backend-canary.yaml k8s/canary/frontend-canary.yaml
          git diff --cached --quiet || git commit -m "canary: update image tags to ${VERSION}"
          git push origin main
        env:
          VERSION: ${{ needs.docker.outputs.version }}

