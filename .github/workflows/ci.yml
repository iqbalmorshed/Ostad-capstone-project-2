name: CI – Build & Push Docker Images

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: iqbalmorshed/quickhire-backend
  FRONTEND_IMAGE: iqbalmorshed/quickhire-frontend

jobs:
  # ── 1. Build test (quick compile check, no Docker) ──
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & build backend
        working-directory: quick-hire
        run: npm ci && npm run build

      - name: Install & build frontend
        working-directory: quick-hire-app
        run: npm ci && NEXT_PUBLIC_API_URL=https://api.example.com/api npm run build

  # ── 2. Build and push Docker images ──
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    # Only push on merge to main/dev, not on PRs
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./quick-hire
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./quick-hire-app
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:2021/api' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
