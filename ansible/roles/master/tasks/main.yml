---
# ──────────────────────────────────────────────
#  Master node — kubeadm init + Calico CNI
# ──────────────────────────────────────────────

- name: Check if cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_check

- name: Initialize Kubernetes cluster
  command: >
    kubeadm init
    --apiserver-advertise-address={{ private_ip }}
    --pod-network-cidr={{ pod_network_cidr }}
    --ignore-preflight-errors=NumCPU
  when: not kubeadm_init_check.stat.exists
  register: kubeadm_init_output

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy admin.conf to ubuntu user's kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Install Calico CNI
  become: false
  command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v{{ calico_version }}/manifests/calico.yaml
  when: not kubeadm_init_check.stat.exists

- name: Wait for master node to be Ready
  become: false
  shell: kubectl get nodes --no-headers | grep -w Ready
  register: node_ready
  retries: 30
  delay: 10
  until: node_ready.rc == 0

- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false

- name: Store join command as fact
  set_fact:
    kubeadm_join_command: "{{ join_command_raw.stdout }}"
