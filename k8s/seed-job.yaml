apiVersion: batch/v1
kind: Job
metadata:
  name: seed-jobs
  namespace: quickhire
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mongo 27017; do echo waiting for mongo; sleep 2; done']
      containers:
        - name: seed
          image: mongo:7
          command:
            - mongosh
            - "mongodb://mongo:27017/quick-hire"
            - --eval
            - |
              const existing = db.jobs.countDocuments();
              if (existing > 0) {
                print(`Already have ${existing} job(s). Skipping seed.`);
                quit(0);
              }
              db.jobs.insertMany([
                { title: "Senior Backend Developer", company: "TechFlow Inc", location: "Remote", category: "Engineering", description: "Build scalable APIs and services. Experience with Node.js, NestJS, and MongoDB required. Join our distributed team.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Frontend Engineer", company: "Pixel Labs", location: "San Francisco, CA", category: "Technology", description: "Create beautiful, responsive UIs with React and Next.js. Strong CSS and TypeScript skills preferred.", createdAt: new Date(), updatedAt: new Date() },
                { title: "UX Designer", company: "Design Studio Co", location: "New York, NY", category: "Design", description: "Own the end-to-end design process for our product suite. Figma, user research, and prototyping experience required.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Sales Representative", company: "Growth Sales Ltd", location: "Chicago, IL", category: "Sales", description: "Drive new business and manage key accounts. Base salary plus commission. B2B SaaS experience a plus.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Marketing Manager", company: "BrandWave", location: "Austin, TX", category: "Marketing", description: "Lead content, SEO, and campaign strategy. Manage a small team and work with product and sales.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Financial Analyst", company: "Summit Finance", location: "Boston, MA", category: "Finance", description: "Support budgeting, forecasting, and reporting. CFA or equivalent experience preferred.", createdAt: new Date(), updatedAt: new Date() },
                { title: "DevOps Engineer", company: "CloudScale", location: "Remote", category: "Engineering", description: "Maintain CI/CD, Kubernetes, and cloud infrastructure. AWS or GCP experience required.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Product Manager", company: "Product First", location: "Seattle, WA", category: "Business", description: "Define roadmap and work with engineering and design. Strong analytical and communication skills.", createdAt: new Date(), updatedAt: new Date() },
                { title: "HR Business Partner", company: "PeopleOps", location: "Denver, CO", category: "Human Resource", description: "Support hiring, onboarding, and employee relations. Experience in fast-growing tech companies.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Data Engineer", company: "DataDriven Inc", location: "Remote", category: "Technology", description: "Build data pipelines and warehouses. SQL, Python, and Spark experience required.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Junior Software Developer", company: "StarterTech", location: "Portland, OR", category: "Engineering", description: "Learn and contribute to our web applications. Mentorship provided. CS degree or bootcamp okay.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Graphic Designer", company: "Visual Studio", location: "Los Angeles, CA", category: "Design", description: "Create marketing assets, illustrations, and brand materials. Adobe Creative Suite proficiency required.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Account Executive", company: "Enterprise Solutions", location: "Dallas, TX", category: "Sales", description: "Close enterprise deals and nurture relationships. Experience with long sales cycles preferred.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Content Writer", company: "Content Hub", location: "Remote", category: "Marketing", description: "Write blog posts, docs, and marketing copy. SEO knowledge and technical writing experience a plus.", createdAt: new Date(), updatedAt: new Date() },
                { title: "Accountant", company: "Ledger Plus", location: "Philadelphia, PA", category: "Finance", description: "Handle month-end close, reconciliations, and compliance. CPA or working toward CPA preferred.", createdAt: new Date(), updatedAt: new Date() },
