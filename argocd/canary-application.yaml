apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quickhire-canary
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iqbalmorshed/Ostad-capstone-project-2.git
    targetRevision: main
    path: k8s/canary
  destination:
    server: https://kubernetes.default.svc
    namespace: quickhire
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
